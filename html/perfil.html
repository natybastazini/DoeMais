<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais - Perfil</title>
    <style>
      .badge-tipo {
        background: #c0392b;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 1rem;
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .card-info {
        border: 1.5px solid #f0f0f0;
        border-radius: 1rem;
        padding: 1.25rem 1.5rem;
        background: #fff;
        box-shadow: 0 2px 12px rgba(0,0,0,.05);
      }
      .card-info label {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .07em;
        color: #c0392b;
        font-family: 'Inter', sans-serif;
      }
      .card-info p {
        font-size: .95rem;
        color: #222;
        font-family: 'Inter', sans-serif;
        margin-top: 2px;
      }
      .doacao-item {
        border-left: 3px solid #c0392b;
        border-radius: 0 .6rem .6rem 0;
        background: #fafafa;
        padding: .7rem 1rem;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>

  <body class="flex flex-col min-h-screen bg-gray-50">

    <!-- ── Header (mesmo do index) ── -->
    <header class="flex w-full justify-between items-center px-10 py-4 bg-white">
      <a href="../index.html" class="flex flex-row items-end">
        <img
          class="w-28 h-28"
          src="../img/logo.png"
          alt="Gota de Sangue com um mais no meio e sinal de batimento cardíaco."
        />
        <p class="flex items-end font-agbalumo text-red-1 pb-2">
          <span class="text-base">Doe</span>
          <span class="text-sm translate-y-1">+</span>
        </p>
      </a>

      <!-- Botão sair -->
      <button
        onclick="logout()"
        class="font-inter font-semibold bg-white text-red-1 border-2 border-red-1 w-32 h-8 rounded-4xl transition-all duration-500 hover:text-white hover:bg-red-1 cursor-pointer"
      >
        Sair
      </button>
    </header>

    <!-- ── Main ── -->
    <main class="flex flex-1 justify-evenly items-start px-10 py-8 gap-8 flex-wrap">

      <!-- Coluna esquerda: avatar + tipo sanguíneo -->
      <div class="flex flex-col items-center justify-center gap-4 w-1/4 min-w-[200px] pt-6">
        <!-- Avatar -->
        <div class="w-32 h-32 rounded-full border-4 border-red-1 overflow-hidden bg-white flex items-center justify-center shadow-md">
          <img
            id="avatar-img"
            src="../img/logo.png"
            alt="Foto de perfil"
            class="w-full h-full object-cover"
          />
        </div>

        <!-- Nome -->
        <h1 id="perfil-nome" class="font-inter font-semibold text-gray-1 text-xl text-center">
          —
        </h1>

        <!-- Badge tipo sanguíneo -->
        <div class="badge-tipo text-lg" id="perfil-tipo">—</div>

        <!-- Botão ver mapa -->
        <a href="./mapa.html" class="mt-2">
          <button
            class="font-inter font-semibold bg-white text-red-1 border-2 border-red-1 w-36 h-8 rounded-4xl transition-all duration-500 hover:text-white hover:bg-red-1 cursor-pointer text-sm"
          >
            Ver hemocentros
          </button>
        </a>
      </div>

      <!-- Coluna direita: dados + histórico -->
      <div class="flex flex-col gap-5 w-1/2 min-w-[300px]">

        <!-- Dados pessoais -->
        <div class="card-info flex flex-col gap-4">
          <h2 class="font-inter font-semibold text-gray-1 text-base">Dados pessoais</h2>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label>E-mail</label>
              <p id="perfil-email">—</p>
            </div>
            <div>
              <label>CPF</label>
              <p id="perfil-cpf">—</p>
            </div>
            <div>
              <label>Data de nascimento</label>
              <p id="perfil-nascimento">—</p>
            </div>
            <div>
              <label>Sexo</label>
              <p id="perfil-sexo">—</p>
            </div>
          </div>
        </div>

        <!-- Histórico de doações -->
        <div class="card-info flex flex-col gap-3">
          <div class="flex justify-between items-center">
            <h2 class="font-inter font-semibold text-gray-1 text-base">Histórico de doações</h2>
            <span id="total-doacoes" class="font-inter text-xs font-semibold text-red-1 border border-red-1 rounded-full px-3 py-0.5">
              0 doações
            </span>
          </div>
          <div id="lista-doacoes" class="flex flex-col gap-2">
            <p class="text-sm text-gray-400 font-inter text-center py-4">Carregando...</p>
          </div>
        </div>

      </div>
    </main>

    <!-- ── Rodapé (mesmo do index) ── -->
    <footer class="flex bg-red-1 rounded-t-xl justify-center items-center py-3 mt-4">
      <p class="font-inter font-thin text-white text-xs text-center">
        &copy; Doe Mais &mdash; Mateus Alcantara, Natália Bastazini, Thiago dos Anjos e Victor Vicentini
      </p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      function formatarCPF(cpf) {
        if (!cpf) return "—";
        return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
      }
      function formatarData(data) {
        if (!data) return "—";
        const [ano, mes, dia] = data.split("-");
        return `${dia}/${mes}/${ano}`;
      }
      function sexoLabel(s) {
        return { M: "Masculino", F: "Feminino", O: "Outro" }[s] || s;
      }

      function preencherPerfil(u) {
        document.getElementById("perfil-nome").textContent       = u.nome || "—";
        document.getElementById("perfil-email").textContent      = u.email || "—";
        document.getElementById("perfil-cpf").textContent        = formatarCPF(u.cpf);
        document.getElementById("perfil-nascimento").textContent = formatarData(u.data_nascimento);
        document.getElementById("perfil-sexo").textContent       = sexoLabel(u.sexo);
        document.getElementById("perfil-tipo").textContent       = u.tipo_sanguineo !== "NAO_SEI" ? u.tipo_sanguineo : "?";
        if (u.foto) document.getElementById("avatar-img").src = u.foto;
      }

      function renderizarDoacoes(doacoes) {
        const lista = document.getElementById("lista-doacoes");
        const total = document.getElementById("total-doacoes");
        total.textContent = `${doacoes.length} ${doacoes.length === 1 ? "doação" : "doações"}`;

        if (!doacoes.length) {
          lista.innerHTML = `
            <div class="flex flex-col items-center gap-1 py-4 text-gray-400">
              <span style="font-size:1.5rem">🩸</span>
              <p class="text-sm font-inter">Nenhuma doação registrada ainda.</p>
            </div>`;
          return;
        }

        lista.innerHTML = doacoes.map(d => `
          <div class="doacao-item">
            <p class="font-semibold text-gray-800 text-sm">${formatarData(d.data_doacao)}</p>
            <p class="text-xs text-gray-400">Hemocentro #${d.hemocentro_id}</p>
            ${d.observacoes ? `<p class="text-xs text-gray-500 mt-1">${d.observacoes}</p>` : ""}
          </div>`).join("");
      }

      async function initPerfil() {
        if (!getToken()) { window.location.href = "./login.html"; return; }

        const cache = localStorage.getItem("usuario");
        if (cache) preencherPerfil(JSON.parse(cache));

        try {
          const res = await fetch(API_URL + "/usuarios/me", { headers: authHeader() });
          if (res.status === 401) { logout(); return; }
          const u = await res.json();
          localStorage.setItem("usuario", JSON.stringify(u));
          preencherPerfil(u);
        } catch (_) {}

        try {
          const res = await fetch(API_URL + "/doacoes/", { headers: authHeader() });
          if (res.ok) renderizarDoacoes(await res.json());
        } catch (_) {
          document.getElementById("lista-doacoes").innerHTML =
            `<p class="text-sm text-gray-400 font-inter text-center py-3">Não foi possível carregar.</p>`;
        }
      }

      initPerfil();
    </script>
  </body>
</html>
