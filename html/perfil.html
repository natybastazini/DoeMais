<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais - Perfil</title>
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal-box {
        background: white;
        border-radius: 1.5rem;
        padding: 2rem;
        width: 90%;
        max-width: 680px;
        max-height: 90vh;
        overflow-y: auto;
        transform: translateY(20px);
        transition: transform 0.25s;
      }
      .modal-overlay.open .modal-box {
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="flex flex-col h-screen bg-gray-50 overflow-hidden">
    <header class="flex flex-col shrink-0 sticky top-0 z-50 bg-white">
      <div class="flex justify-between items-center p-4">
        <div class="flex flex-row items-end">
          <a href="../index.html" class="flex flex-row items-end">
            <img class="w-28 h-28" src="../img/logo.png" alt="Logo" />
            <p class="flex items-end font-agbalumo text-red-1 pb-2">
              <span class="text-base">Doe</span>
              <span class="text-sm translate-y-1">+</span>
            </p>
          </a>
        </div>
        <ul
          class="flex flex-row gap-4 font-inter text-gray-1 font-light w-2/5 h-full justify-evenly items-center"
        >
          <li class="cursor-pointer hover:text-red-1">
            <a href="./faq.html">Saiba mais</a>
          </li>
          <li class="cursor-pointer hover:text-red-1">
            <a href="./mapa.html">Mapa</a>
          </li>
        </ul>
        <div id="area-usuario-faq">
          <a href="./cadastro.html">
            <button
              class="font-inter font-semibold bg-white text-red-1 border-2 border-red-1 w-32 h-8 rounded-4xl transition-all duration-500 hover:text-white hover:bg-red-1 cursor-pointer"
            >
              Quero doar!
            </button>
          </a>
        </div>
      </div>
      <hr class="opacity-30 shrink-0 w-full" />
    </header>

    <main class="flex flex-1 justify-center items-center px-4 overflow-hidden">
      <div style="width: 70%">
        <div class="text-center mb-4">
          <h1 class="text-3xl font-bold font-inter text-gray-1">
            Meu <span class="text-red-1">Perfil</span>
          </h1>
          <p class="font-inter text-gray-3 mt-1 text-sm">
            Gerencie suas informações de doador
          </p>
        </div>

        <div
          class="bg-white rounded-3xl shadow-md border border-gray-200 p-6 flex flex-col gap-3"
        >
          <h3 class="font-inter font-semibold text-gray-1 text-base">
            Informações
          </h3>

          <div class="grid grid-cols-2 gap-3 text-sm font-inter">
            <div class="col-span-2">
              <span class="text-xs font-semibold text-gray-3 ml-1">Nome</span>
              <div
                id="v-nome"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
            <div class="col-span-2">
              <span class="text-xs font-semibold text-gray-3 ml-1">E-mail</span>
              <div
                id="v-email"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
            <div>
              <span class="text-xs font-semibold text-gray-3 ml-1"
                >Data de nascimento</span
              >
              <div
                id="v-data"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
            <div>
              <span class="text-xs font-semibold text-gray-3 ml-1">Sexo</span>
              <div
                id="v-sexo"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
            <div>
              <span class="text-xs font-semibold text-gray-3 ml-1">CPF</span>
              <div
                id="v-cpf"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
            <div>
              <span class="text-xs font-semibold text-gray-3 ml-1"
                >Tipo sanguíneo</span
              >
              <div
                id="v-tipo"
                class="mt-0.5 px-3 py-2 rounded-xl bg-gray-50 border border-gray-200 text-gray-1"
              >
                —
              </div>
            </div>
          </div>

          <div
            class="flex justify-between items-center mt-2 pt-2 border-t border-gray-100"
          >
            <button
              id="btn-sair"
              type="button"
              class="text-gray-3 text-xs font-inter hover:text-red-1 underline cursor-pointer"
            >
              Sair da conta
            </button>
            <button
              id="btn-editar"
              type="button"
              class="inline-flex items-center gap-2 border-2 border-red-1 text-red-1 font-inter font-semibold rounded-full px-5 py-1.5 text-sm transition-all duration-300 hover:bg-red-1 hover:text-white cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="w-4 h-4"
              >
                <path
                  d="M21.731 2.269a2.625 2.625 0 0 0-3.712 0l-1.157 1.157 3.712 3.712 1.157-1.157a2.625 2.625 0 0 0 0-3.712ZM19.513 8.199l-3.712-3.712-8.4 8.4a5.25 5.25 0 0 0-1.32 2.214l-.8 2.685a.75.75 0 0 0 .933.933l2.685-.8a5.25 5.25 0 0 0 2.214-1.32l8.4-8.4Z"
                />
              </svg>
              Editar
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- MODAL -->
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal-box">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-inter font-bold text-gray-1 text-lg">
            Editar Perfil
          </h2>
          <button
            id="btn-fechar-modal"
            class="text-gray-3 hover:text-red-1 cursor-pointer text-2xl font-bold leading-none"
          >
            &times;
          </button>
        </div>

        <div
          id="perfil-msg"
          class="hidden rounded-2xl px-4 py-2 text-sm font-inter mb-3"
        ></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm font-inter">
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >Nome</label
            >
            <input
              id="f-nome"
              type="text"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1"
            />
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >E-mail</label
            >
            <input
              id="f-email"
              type="email"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >Data de nascimento</label
            >
            <input
              id="f-data"
              type="date"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >Sexo</label
            >
            <select
              id="f-sexo"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1 cursor-pointer"
            >
              <option value="">—</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
              <option value="O">Outro</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >CPF</label
            >
            <input
              id="f-cpf"
              type="text"
              maxlength="14"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >Tipo sanguíneo</label
            >
            <select
              id="f-tipo"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1 cursor-pointer"
            >
              <option value="">—</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="NAO_SEI">Não sei informar</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-3 mb-1 ml-1"
              >Senha</label
            >
            <input
              id="f-senha"
              type="password"
              placeholder="Nova senha (deixe em branco para manter)"
              class="w-full rounded-2xl border-2 border-gray-2 bg-white px-4 py-2.5 text-gray-1 text-sm font-inter outline-none focus:border-red-1"
            />
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-5">
          <button
            id="btn-cancelar"
            type="button"
            class="text-gray-3 font-inter text-sm hover:text-red-1 cursor-pointer"
          >
            Cancelar
          </button>
          <button
            id="btn-salvar"
            type="button"
            class="inline-flex items-center gap-2 bg-red-1 border-2 border-red-1 text-white font-inter font-semibold rounded-full px-6 py-1.5 text-sm transition-all duration-300 hover:bg-red-2 hover:border-red-2 cursor-pointer"
          >
            Salvar
          </button>
        </div>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/perfil.js"></script>
  </body>
</html>
