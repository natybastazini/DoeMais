<!doctype html>
<html lang="pt-br">
  <head>
  <meta charset="UTF-8" />
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "./login.html";
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="../dist/output.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="../img/logo.png" type="image/png" />
  <title>Doe Mais - Mapa</title>
  <style>
    #map {
      height: 60vh;
    }
    @media (max-width: 768px) {
      #map { height: 300px; }
      .nav-menu { display: none; }
      .header-logo img { width: 3rem; height: 3rem; }
      .page-title { font-size: 2rem; }
    }
  </style>
</head>
  <body class="flex flex-col min-h-screen">
    <header class="flex flex-col sticky top-0 z-50 bg-white">
      <div class="flex justify-between items-center p-4">
        <!-- Logo -->
        <div class="header-logo flex flex-row items-end">
          <img
            class="w-28 h-28"
            src="../img/logo.png"
            alt="Gota de Sangue com um mais no meio e sinal de batimento cardiáco."
          />
          <p class="flex items-end font-agbalumo text-red-1 pb-2">
            <span class="text-base">Doe</span>
            <span class="text-sm translate-y-1">+</span>
          </p>
        </div>
        <!-- Navegação -->
        <ul
          class="nav-menu flex flex-row gap-4 font-inter text-gray-1 font-light w-2/5 h-full justify-evenly items-center"
        >
          <li class="cursor-pointer hover:text-red-1">
            <a href="./faq.html">Saiba mais</a>
          </li>
          <li class="cursor-pointer hover:text-red-1">
            <a href="./mapa.html">Mapa</a>
          </li>
        </ul>
        <!-- Botão cadastro -->
        <a href="./cadastro.html">
          <button
            class="font-inter font-semibold bg-white text-red-1 border-2 border-red-1 w-32 h-8 rounded-4xl transition-all duration-500 hover:text-white hover:bg-red-1 cursor-pointer"
          >
            Quero doar!
          </button>
        </a>
      </div>
      <hr class="opacity-30 shrink-0 w-full" />
    </header>
    <main class="flex flex-1 flex-col items-center justify-around">
      <!-- Título -->
      <div class="text-center pt-4 pb-4">
        <h1 class="page-title text-5xl font-semibold text-red-1">Hemocentros Próximos</h1>
      </div>
      <!-- Mapa -->
      <div class="relative w-3/5 px-8">
        <div
          id="map"
          class="w-full rounded-2xl overflow-hidden shadow-md"
        ></div>
      </div>

      <!-- Barra de pesquisa -->
      <div class="flex justify-center mt-4 px-8">
        <input
          id="search-input"
          type="text"
          placeholder="Digite seu endereço"
          class="w-full max-w-2xl border border-gray-300 rounded-full px-6 py-3 text-gray-500 shadow-sm outline-none focus:border-red-1 font-inter"
        />
      </div>
    </main>
    <script src="../js/mapa.js"></script>
    <script>
  if (!localStorage.getItem("token")) {
    window.location.href = "./login.html";
  }
</script>
  </body>
</html>
