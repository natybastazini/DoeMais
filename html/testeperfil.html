<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&display=swap" rel="stylesheet" />
    <link rel="icon" href="../img/logo.png" type="image/png" />
    <title>Doe Mais - Perfil</title>
  </head>
  <body class="flex flex-col min-h-screen">
    <header class="flex flex-col sticky top-0 z-50 bg-white">
      <div class="flex justify-between items-center p-4">
        <div class="flex flex-row items-end">
          <img class="w-28 h-28" src="../img/logo.png" alt="Logo" />
          <p class="flex items-end font-agbalumo text-red-1 pb-2">
            <span class="text-base">Doe</span>
            <span class="text-sm translate-y-1">+</span>
          </p>
        </div>
        <ul class="flex flex-row gap-4 font-inter text-gray-1 font-light w-2/5 h-full justify-evenly items-center">
          <li class="cursor-pointer hover:text-red-1"><a href="./faq.html">Saiba mais</a></li>
          <li class="cursor-pointer hover:text-red-1"><a href="./mapa.html">Mapa</a></li>
        </ul>
        <div id="area-usuario-perfil"></div>
      </div>
      <hr class="opacity-30 shrink-0 w-full" />
    </header>

    <main class="flex flex-col items-center pt-10 pb-20 gap-8">
      <div class="text-center">
        <h1 class="text-5xl font-semibold font-inter">Meu <span class="text-red-1">Perfil</span></h1>
        <p class="text-gray-3 font-inter mt-2">Mantenha seus dados sempre atualizados</p>
      </div>

      <div class="w-7xl bg-white border border-gray-200 rounded-2xl p-10 flex flex-row gap-10">

        <!-- Lado esquerdo -->
        <div class="flex flex-col items-center gap-4 min-w-36">
          <div class="w-28 h-28 rounded-full border-4 border-red-1 overflow-hidden flex items-center justify-center bg-red-50">
            <img id="foto-perfil" src="../img/foto_perfil.png" alt="Foto de perfil" class="w-full h-full object-cover" />
          </div>
          <label class="font-inter font-semibold text-red-1 border-2 border-red-1 rounded-full px-5 py-1.5 text-sm cursor-pointer hover:bg-red-1 hover:text-white transition-all duration-300">
            Alterar foto
            <input type="file" accept="image/*" class="hidden" onchange="previewFoto(event)" />
          </label>
        </div>

        <!-- Lado direito -->
        <div class="flex flex-col gap-6 flex-1">

          <!-- Dados pessoais -->
          <div class="flex flex-col gap-3">
            <p class="text-red-1 text-xs font-inter font-bold uppercase tracking-widest">Dados pessoais</p>
            <input type="text" placeholder="Nome completo" class="w-full border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
            <div class="flex gap-4">
              <input type="date" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
              <select class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1">
                <option value="">Sexo</option>
                <option>Feminino</option>
                <option>Masculino</option>
                <option>Outro</option>
              </select>
            </div>
            <div class="flex gap-4">
              <select class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1">
                <option value="">Tipo sanguíneo</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>AB+</option><option>AB-</option>
                <option>O+</option><option>O-</option>
              </select>
              <input type="text" placeholder="CPF" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
            </div>
          </div>

          <hr class="opacity-20" />

          <!-- Contato -->
          <div class="flex flex-col gap-3">
            <p class="text-red-1 text-xs font-inter font-bold uppercase tracking-widest">Contato</p>
            <input type="email" placeholder="E-mail" class="w-full border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
          </div>

          <hr class="opacity-20" />

          <!-- Endereço -->
          <div class="flex flex-col gap-3">
            <p class="text-red-1 text-xs font-inter font-bold uppercase tracking-widest">Endereço</p>
            <div class="flex gap-4">
              <input type="text" placeholder="CEP" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
              <input type="text" placeholder="Estado" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
            </div>
            <div class="flex gap-4">
              <input type="text" placeholder="Cidade" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
              <input type="text" placeholder="Bairro" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
            </div>
            <div class="flex gap-4">
              <input type="text" placeholder="Rua" class="flex-1 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
              <input type="text" placeholder="Número" class="w-28 border-2 border-gray-200 rounded-full px-4 py-2 font-inter text-gray-1 focus:outline-none focus:border-red-1" />
            </div>
          </div>

          <!-- Botão salvar -->
          <button class="w-full font-inter font-semibold border-2 border-red-1 text-red-1 bg-white rounded-full py-2 transition-all duration-300 hover:bg-red-1 hover:text-white cursor-pointer">
            Salvar alterações
          </button>

        </div>
      </div>
    </main>

    <footer class="flex h-10 bg-red-1 rounded-t-xl justify-center items-center shrink-0">
      <p class="font-inter font-thin text-white text-xs text-center px-4">
        &copy; Doe+ By Mateus de Alcantara, Natália Bastazini, Victor Vicentini e Thiago do Anjos
      </p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      function previewFoto(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = e => document.getElementById('foto-perfil').src = e.target.result;
          reader.readAsDataURL(file);
        }
      }
    </script>
  </body>
</html>
